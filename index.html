<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <title>Simple HTML Form</title>
</head>

<body>

<h2>User Registration Form</h2>

<form name="myForm" onsubmit="return validateForm()">


    <!-- Name -->
    <label>Full Name:</label><br>
    <input type="text" name="fullname" required><br><br>

    <!-- Email -->
    <label>Email Address:</label><br>
    <input type="email" name="email" required><br><br>

    <!-- Password -->
    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <!-- Gender -->
    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male"> Male<br>
    <input type="radio" name="gender" value="Female"> Female<br>
    <input type="radio" name="gender" value="Other"> Other<br><br>

    <!-- Date of Birth -->
    <label>Date of Birth:</label><br>
    <input type="date" name="dob"><br><br>

    <!-- Skills -->
    <label>Skills:</label><br>
    <input type="checkbox" name="skills[]" value="HTML"> HTML<br>
    <input type="checkbox" name="skills[]" value="CSS"> CSS<br>
    <input type="checkbox" name="skills[]" value="JavaScript"> JavaScript<br><br>

    <!-- Country -->
    <label>Country:</label><br>
    <select name="country">
        <option value="">Select</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
    </select><br><br>

    <!-- Address -->
    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30"></textarea><br><br>

    <!-- Submit -->
    <input type="submit" value="Register">
    <input type="reset" value="Clear">

</form>

</body>
     <p> <script src="script.js"></script>
</p>
</html>
